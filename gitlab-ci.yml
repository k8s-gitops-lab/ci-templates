workflow:
  rules:
    # Trunk-based : "main" est l'unique branche longue durée côté code.
    # Les tags vX.Y.Z portent la chaîne de promotion.
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_TAG'

stages:
  - build
  - deploy
  - promote

# CI_SCRIPTS_DIR : répertoire contenant les scripts Python de ce template.
# - CI GitLab     : laisser vide — le before_script clone ci-templates depuis GitLab.
# - gitlab-ci-local : pointer vers le checkout local de ci-templates
#   (ex: CI_SCRIPTS_DIR=/home/user/poc-devops/ci-templates dans .gitlab-ci-local.yml).
variables:
  CI_SCRIPTS_DIR: ""
  # Variable propre : registre cible pour l'auth Kaniko/crane. SERVICES porte
  # deja une image complete par service (<svc>=<registre>/<image>), mais
  # l'auth ne peut cibler qu'un seul registre a la fois — celui-ci doit
  # correspondre a l'hote utilise dans SERVICES.
  REGISTRY_HOST: ghcr.io
  # Constante de plateforme (meme instance GitLab in-cluster pour toutes les
  # apps de ce POC, cf. platform-gitops/argocd/apps.yaml: gitlab.internalHost)
  # — pas une variable propre par app. A surcharger localement dans le
  # .gitlab-ci.yml d'une app seulement si elle cible une autre instance GitLab.
  INTERNAL_GITLAB_HOST: gitlab-webservice-default.gitlab.svc.cluster.local:8181

# Injecté par !reference dans les before_script des jobs qui ont besoin des
# scripts de ce dépôt (Python et Node). Clone ci-templates si CI_SCRIPTS_DIR
# n'est pas défini localement.
.fetch-scripts:
  before_script:
    - |
      if [ -z "$CI_SCRIPTS_DIR" ]; then
        apk add --no-cache git > /dev/null
        git clone --quiet --depth=1 \
          "http://root:${GITLAB_PUSH_TOKEN}@${INTERNAL_GITLAB_HOST}/shared-ci/ci-templates.git" \
          /tmp/ci-scripts
        export CI_SCRIPTS_DIR=/tmp/ci-scripts
      fi

.build:
  stage: build
  image:
    name: gcr.io/kaniko-project/executor:debug
    entrypoint: [""]
  before_script:
    - mkdir -p /kaniko/.docker /kaniko/ssl/certs
    - echo "${ZSCALER_CA_B64}" | base64 -d >> /kaniko/ssl/certs/ca-certificates.crt
    - echo "{\"auths\":{\"${REGISTRY_HOST}\":{\"auth\":\"$(echo -n "x-token:${GHCR_TOKEN}" | base64)\"}}}" > /kaniko/.docker/config.json
  # Monorepo multi-services : un sous-dossier + un Dockerfile par service.
  # ${SERVICES} est une liste "<service>=<image>" séparée par des espaces.

.deploy:
  stage: deploy
  image: python:3.12-alpine
  before_script:
    - !reference [.fetch-scripts, before_script]
    - pip install --quiet pyyaml

semantic-release:
  stage: promote
  image: node:20-alpine
  interruptible: false
  needs: ["deploy-dev"]
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
  variables:
    GITLAB_TOKEN: $GITLAB_PUSH_TOKEN
    GITLAB_URL: http://${INTERNAL_GITLAB_HOST}
  before_script:
    - !reference [.fetch-scripts, before_script]
  script:
    - apk add --no-cache ca-certificates git
    # Résout GITLAB_URL (via .releaserc.json) et fait confiance au certificat
    # auto-signé de l'endpoint HTTPS s'il y en a un. Voir scripts/gitlab-release-env.js.
    - node "$CI_SCRIPTS_DIR/scripts/gitlab-release-env.js"
    - source /tmp/gitlab-tls.env
    - npm install --no-save semantic-release@24 @semantic-release/commit-analyzer @semantic-release/release-notes-generator @semantic-release/gitlab
    - npx semantic-release

# ---------------------------------------------------------------------------
# build  (Kaniko — pas de démon Docker requis dans le runner Kubernetes)
# ---------------------------------------------------------------------------

build-dev:
  extends: .build
  interruptible: true
  # needs: [] → DAG : démarre immédiatement sans attendre le stage précédent.
  needs: []
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
  script:
    - |
      for entry in ${SERVICES}; do
        svc="${entry%%=*}"
        image="${entry#*=}"
        /kaniko/executor \
          --context "${CI_PROJECT_DIR}/${svc}" \
          --dockerfile "${CI_PROJECT_DIR}/${svc}/Dockerfile" \
          --destination "${image}:${CI_COMMIT_SHORT_SHA}" \
          --destination "${image}:dev"
      done

build-rec:
  stage: build
  image:
    name: gcr.io/go-containerregistry/crane:debug
    entrypoint: [""]
  interruptible: false
  variables:
    DOCKER_CONFIG: /tmp/.docker
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/'
  before_script:
    - mkdir -p "${DOCKER_CONFIG}"
    - echo "{\"auths\":{\"${REGISTRY_HOST}\":{\"auth\":\"$(echo -n "x-token:${GHCR_TOKEN}" | base64)\"}}}" > "${DOCKER_CONFIG}/config.json"
  script:
    # Retag l'image SHA (buildée par build-dev) avec le tag de version.
    # Évite un rebuild : dev et prod ont le même digest.
    - |
      for entry in ${SERVICES}; do
        image="${entry#*=}"
        if crane manifest --insecure "${image}:${CI_COMMIT_TAG}" > /dev/null 2>&1; then
          echo "${image}:${CI_COMMIT_TAG} existe déjà dans le registry, rien à faire."
          continue
        fi
        crane copy --insecure \
          "${image}:${CI_COMMIT_SHORT_SHA}" \
          "${image}:${CI_COMMIT_TAG}"
      done

# ---------------------------------------------------------------------------
# deploy  (Python — pas de kustomize binaire requis, PyYAML suffit)
# ---------------------------------------------------------------------------

deploy-dev:
  extends: .deploy
  resource_group: manifests-dev
  interruptible: true
  needs: ["build-dev"]
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
  environment:
    name: dev
    url: http://${SERVICE_NAME}-dev.${DOMAIN}
    kubernetes:
      agent: $GITLAB_K8S_AGENT
      namespace: ${APP_NAME}-dev
  script:
    - python3 $CI_SCRIPTS_DIR/scripts/deploy.py dev

deploy-rec:
  extends: .deploy
  resource_group: manifests-rec
  interruptible: false
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/'
  environment:
    name: rec
    url: http://${SERVICE_NAME}-rec.${DOMAIN}
    kubernetes:
      agent: $GITLAB_K8S_AGENT
      namespace: ${APP_NAME}-rec
  script:
    - python3 $CI_SCRIPTS_DIR/scripts/deploy.py rec

deploy-preprod:
  extends: .deploy
  resource_group: manifests-preprod
  interruptible: false
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/ && $HAS_PREPROD == "true"'
      when: manual
  environment:
    name: preprod
    url: http://${SERVICE_NAME}-preprod.${DOMAIN}
    kubernetes:
      agent: $GITLAB_K8S_AGENT
      namespace: ${APP_NAME}-preprod
  script:
    - python3 $CI_SCRIPTS_DIR/scripts/deploy.py preprod

deploy-prod:
  extends: .deploy
  resource_group: manifests-prod
  interruptible: false
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/'
      when: manual
  environment:
    name: prod
    url: http://${SERVICE_NAME}.${DOMAIN}
    kubernetes:
      agent: $GITLAB_K8S_AGENT
      namespace: ${APP_NAME}
  script:
    - python3 $CI_SCRIPTS_DIR/scripts/deploy.py prod

# ---------------------------------------------------------------------------
# promote
# ---------------------------------------------------------------------------

rollback-prod:
  stage: promote
  image: python:3.12-alpine
  interruptible: false
  needs: []
  rules:
    - if: '$CI_COMMIT_BRANCH == "main" && $REVERT_SHA'
      when: manual
  environment:
    name: prod
  before_script:
    - !reference [.fetch-scripts, before_script]
  script:
    - python3 $CI_SCRIPTS_DIR/scripts/rollback.py
