spec:
  inputs:
    snapshot_image:
      description: >-
        Image "snapshot" poussee au build, retaguee sans rebuild par
        docker-publish sur tag vX.Y.Z. Pour un monorepo multi-service,
        laisser le defaut et surcharger DOCKER_SNAPSHOT_IMAGE par service via
        un bloc `parallel: matrix:` sur le job `docker-buildah-build` dans le
        `.gitlab-ci.yml` de l'app (voir README).
      default: $CI_REGISTRY_IMAGE/snapshot:$CI_COMMIT_SHORT_SHA
    release_image:
      description: >-
        Image "release" (repository, sans tag) poussee par docker-publish.
        Meme remarque monorepo que snapshot_image.
      default: $CI_REGISTRY_IMAGE
    dockerfile:
      description: Chemin du Dockerfile (relatif a la racine du depot applicatif).
      default: Dockerfile
    context_path:
      description: Contexte de build Docker, si different du dossier du Dockerfile.
      default: ''
---
# Builder interchangeable (Buildah par defaut ; Kaniko est abandonne par
# Google depuis janvier 2025) et pattern build-once/promote (docker-publish
# retague l'image snapshot sans rebuild), fournis par to-be-continuous —
# plus de duplication de cette logique dans ce depot. Version figee ici,
# seul point de mise a jour du composant amont pour toutes les apps.
# Resolu via le miroir local to-be-continuous/* (GitLab ne resout les
# components que sur sa propre instance, cf. gitlab-projects-iac).
include:
  - component: $CI_SERVER_FQDN/to-be-continuous/docker/gitlab-ci-docker@6.1.0
    inputs:
      # Buildah explicite : le defaut amont est kaniko, et tout le contrat de
      # ce depot (needs des deploys, overrides parallel:matrix des apps)
      # nomme le job docker-buildah-build.
      build-tool: buildah
      snapshot-image: $[[ inputs.snapshot_image ]]
      release-image: $[[ inputs.release_image ]]
      file: $[[ inputs.dockerfile ]]
      context-path: $[[ inputs.context_path ]]
      # deploy-rec est deja un job automatique sur tag (cf. deploy-gitops) ;
      # pas de gate manuel supplementaire au niveau de la publication d'image.
      prod-publish-strategy: auto

# La confiance TLS (proxy sortant + GitLab interne auto-signe) est geree
# automatiquement par le composant via la variable de plateforme
# CUSTOM_CA_CERTS (PEM en clair, pas de before_script a ecrire) — voir
# AGENTS.md.

# Auth GHCR : to-be-continuous s'authentifie via DOCKER_REGISTRY_USER/
# PASSWORD (sinon il retombe sur le registre GitLab integre, desactive sur
# ce POC). Meme convention que l'ancien job kaniko : user factice x-token +
# GHCR_TOKEN (variable de groupe provisionnee par gitlab-projects-iac).
variables:
  DOCKER_REGISTRY_USER: x-token
  DOCKER_REGISTRY_PASSWORD: $GHCR_TOKEN

# Runner Kubernetes non privilegie (pas de /dev/fuse) : fuse-overlayfs est
# indisponible, on force le stockage vfs et l'isolation chroot — plus lent,
# mais fonctionne sans privileges (raison historique du choix kaniko).
docker-buildah-build:
  variables:
    STORAGE_DRIVER: vfs
    BUILDAH_ISOLATION: chroot

# L'image syft tourne en non-root : l'import de CUSTOM_CA_CERTS dans
# /etc/ssl/certs echoue en Permission denied et fait tomber le job. Pas de
# CA custom pour ce job (l'import amont est saute quand la variable est
# vide) — le pull ghcr.io se fait avec les CAs de l'image.
docker-sbom:
  variables:
    CUSTOM_CA_CERTS: ""
    DEFAULT_CA_CERTS: ""

# L'image skopeo (UBI minimal) n'embarque pas python3, requis par
# merge_json (fusion des configs d'auth source/dest Skopeo) — appelee
# depuis configure_registries_auth, elle-meme executee par le
# before_script standard du composant (CA certs, auth registres) : python3
# doit donc etre installe AVANT ce before_script, pas apres.
docker-publish:
  before_script:
    - microdnf install -y python3 --setopt=install_weak_deps=0 --nodocs
    - !reference [.docker-base, before_script]
