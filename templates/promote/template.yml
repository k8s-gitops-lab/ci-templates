spec:
  inputs:
    manifests_project_path:
      description: >-
        Chemin du dépôt manifests GitOps ciblé (utilisé par rollback-prod,
        ex: "hello-groupe/helloworld-iac").
      regex: '^[\w.-]+(/[\w.-]+)+$'
---
# Constante de plateforme (même instance GitLab in-cluster pour toutes les
# apps de ce POC, cf. platform-gitops/argocd/apps.yaml: gitlab.internalHost)
# — surchargée localement seulement si l'app cible une autre instance GitLab.
variables:
  CI_SCRIPTS_DIR: ""
  INTERNAL_GITLAB_HOST: gitlab-webservice-default.gitlab.svc.cluster.local:8181
  MANIFESTS_PROJECT_PATH: $[[ inputs.manifests_project_path ]]

# Le job `semantic-release` fait main (npm install + trust manuel du
# certificat auto-signe via un script Node ad hoc, retire) est remplace par
# ce composant, maintenu en amont — meme outil. Le contournement TLS n'est
# plus necessaire : le `.releaserc.json` de chaque app pointe deja sur
# l'endpoint interne HTTP `INTERNAL_GITLAB_HOST` (pas de HTTPS a faire
# confiance pour l'appel a l'API GitLab). CUSTOM_CA_CERTS (meme variable de
# plateforme que build-docker) couvre le reste (accès npm via le proxy
# sortant).
include:
  - component: gitlab.com/to-be-continuous/semantic-release/gitlab-ci-semrel@4.3.0
    inputs:
      auto-release-enabled: true

semantic-release:
  needs: ["deploy-dev"]
  variables:
    GITLAB_TOKEN: $GITLAB_PUSH_TOKEN

# Injecté par !reference dans les before_script des jobs qui ont besoin des
# scripts de ce dépôt (Python). Clone ci-templates si CI_SCRIPTS_DIR n'est
# pas défini localement.
.fetch-scripts:
  before_script:
    - |
      if [ -z "$CI_SCRIPTS_DIR" ]; then
        apk add --no-cache git > /dev/null
        git clone --quiet --depth=1 \
          "http://root:${GITLAB_PUSH_TOKEN}@${INTERNAL_GITLAB_HOST}/shared-ci/ci-templates.git" \
          /tmp/ci-scripts
        export CI_SCRIPTS_DIR=/tmp/ci-scripts
      fi

rollback-prod:
  stage: promote
  image: python:3.12-alpine
  interruptible: false
  needs: []
  rules:
    - if: '$CI_COMMIT_BRANCH == "main" && $REVERT_SHA'
      when: manual
  environment:
    name: prod
  before_script:
    - !reference [.fetch-scripts, before_script]
  script:
    - python3 $CI_SCRIPTS_DIR/scripts/rollback.py
