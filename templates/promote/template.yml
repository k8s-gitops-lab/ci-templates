spec:
  inputs:
    manifests_project_path:
      description: >-
        Chemin du dépôt manifests GitOps ciblé (utilisé par rollback-prod,
        ex: "hello-groupe/helloworld-iac").
      regex: '^[\w.-]+(/[\w.-]+)+$'
---
# Constante de plateforme (même instance GitLab in-cluster pour toutes les
# apps de ce POC, cf. platform-gitops/argocd/apps.yaml: gitlab.internalHost)
# — surchargée localement seulement si l'app cible une autre instance GitLab.
variables:
  CI_SCRIPTS_DIR: ""
  INTERNAL_GITLAB_HOST: gitlab-webservice-default.gitlab.svc.cluster.local:8181
  MANIFESTS_PROJECT_PATH: $[[ inputs.manifests_project_path ]]

# Injecté par !reference dans les before_script des jobs qui ont besoin des
# scripts de ce dépôt (Python et Node). Clone ci-templates si CI_SCRIPTS_DIR
# n'est pas défini localement.
.fetch-scripts:
  before_script:
    - |
      if [ -z "$CI_SCRIPTS_DIR" ]; then
        apk add --no-cache git > /dev/null
        git clone --quiet --depth=1 \
          "http://root:${GITLAB_PUSH_TOKEN}@${INTERNAL_GITLAB_HOST}/shared-ci/ci-templates.git" \
          /tmp/ci-scripts
        export CI_SCRIPTS_DIR=/tmp/ci-scripts
      fi

semantic-release:
  stage: promote
  image: node:20-alpine
  interruptible: false
  needs: ["deploy-dev"]
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
  variables:
    GITLAB_TOKEN: $GITLAB_PUSH_TOKEN
    GITLAB_URL: http://${INTERNAL_GITLAB_HOST}
  before_script:
    - !reference [.fetch-scripts, before_script]
  script:
    - apk add --no-cache ca-certificates git
    # Résout GITLAB_URL (via .releaserc.json) et fait confiance au certificat
    # auto-signé de l'endpoint HTTPS s'il y en a un. Voir scripts/gitlab-release-env.js.
    - node "$CI_SCRIPTS_DIR/scripts/gitlab-release-env.js"
    - source /tmp/gitlab-tls.env
    - npm install --no-save semantic-release@24 @semantic-release/commit-analyzer @semantic-release/release-notes-generator @semantic-release/gitlab
    - npx semantic-release

rollback-prod:
  stage: promote
  image: python:3.12-alpine
  interruptible: false
  needs: []
  rules:
    - if: '$CI_COMMIT_BRANCH == "main" && $REVERT_SHA'
      when: manual
  environment:
    name: prod
  before_script:
    - !reference [.fetch-scripts, before_script]
  script:
    - python3 $CI_SCRIPTS_DIR/scripts/rollback.py
