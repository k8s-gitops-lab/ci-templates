spec:
  inputs:
    manifests_project_path:
      description: >-
        Chemin du dépôt manifests GitOps ciblé (utilisé par rollback-prod,
        ex: "hello-groupe/helloworld-iac").
      regex: '^[\w.-]+(/[\w.-]+)+$'
---
# Constantes de plateforme -- defauts historiques (instance GitLab locale,
# groupes top-level), surchargeables via variable CI/CD de groupe. gitlab.com
# (structure imbriquee sous k8s-gitops-lab, cf. cockpit/docs/backlog.md)
# surcharge INTERNAL_GITLAB_HOST, GITLAB_PUSH_SCHEME, GITLAB_PUSH_USERNAME et
# CI_TEMPLATES_PROJECT_PATH (gitlab-projects-iac/terraform).
variables:
  CI_SCRIPTS_DIR: ""
  INTERNAL_GITLAB_HOST: gitlab-webservice-default.gitlab.svc.cluster.local:8181
  CI_TEMPLATES_PROJECT_PATH: shared-ci/ci-templates
  GITLAB_PUSH_SCHEME: http
  GITLAB_PUSH_USERNAME: root
  MANIFESTS_PROJECT_PATH: $[[ inputs.manifests_project_path ]]

# Le job `semantic-release` fait main (npm install + trust manuel du
# certificat auto-signe via un script Node ad hoc, retire) est remplace par
# ce composant, maintenu en amont — meme outil. GITLAB_URL/GITLAB_TOKEN
# passes en variables de job : le plugin @semantic-release/gitlab les
# consomme directement, pas besoin de les figer dans le .releaserc.json de
# chaque app (portable entre instances). CUSTOM_CA_CERTS (meme variable de
# plateforme que build-docker) couvre la confiance TLS sortante (proxy
# d'entreprise, cf. cockpit/docs/backlog.md section observabilite).
# to-be-continuous est resolu directement depuis gitlab.com : le miroir
# local (gitlab-projects-iac) est desormais inutilise, GitLab ne resolvant
# les components que sur sa propre instance.
include:
  - component: $CI_SERVER_FQDN/to-be-continuous/semantic-release/gitlab-ci-semrel@4.3.0
    inputs:
      auto-release-enabled: true

# Stage promote (et non publish, defaut to-be-continuous) : semantic-release
# suit deploy-dev, alors que docker-publish (stage publish) doit preceder
# deploy-rec — publish est donc declare avant deploy dans la liste des stages
# de l'app (cf. README), et la release passe apres.
semantic-release:
  stage: promote
  needs: ["deploy-dev"]
  variables:
    GITLAB_TOKEN: $GITLAB_PUSH_TOKEN
    GITLAB_URL: "${GITLAB_PUSH_SCHEME}://${INTERNAL_GITLAB_HOST}"

# Injecté par !reference dans les before_script des jobs qui ont besoin des
# scripts de ce dépôt (Python). Clone ci-templates si CI_SCRIPTS_DIR n'est
# pas défini localement.
.fetch-scripts:
  before_script:
    - |
      if [ -z "$CI_SCRIPTS_DIR" ]; then
        apk add --no-cache git > /dev/null
        git clone --quiet --depth=1 \
          "${GITLAB_PUSH_SCHEME}://${GITLAB_PUSH_USERNAME}:${GITLAB_PUSH_TOKEN}@${INTERNAL_GITLAB_HOST}/${CI_TEMPLATES_PROJECT_PATH}.git" \
          /tmp/ci-scripts
        export CI_SCRIPTS_DIR=/tmp/ci-scripts
      fi

rollback-prod:
  stage: promote
  image: python:3.12-alpine
  interruptible: false
  needs: []
  rules:
    - if: '$CI_COMMIT_BRANCH == "main" && $REVERT_SHA'
      when: manual
  environment:
    name: prod
  before_script:
    - !reference [.fetch-scripts, before_script]
  script:
    - python3 $CI_SCRIPTS_DIR/scripts/rollback.py
